services:
  gestion_db:
    image: mysql:8.4
    container_name: gestion_db
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: sistema_laravel_db 
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app_reflex:
    build: .
    container_name: app_reflex
    ports:
      - "3000:3000"
      - "8001:8000"
    environment:
      - PYTHONPATH=/app
      - DB_URL=mysql+pymysql://root:root_password@gestion_db:3306/sistema_reflex_db
    # --- CAMBIO AQUÍ ---
    volumes:
      - .:/app  # Sincroniza tu carpeta actual con /app en el contenedor
    depends_on:
      gestion_db:
        condition: service_healthy

volumes:
  db_data:

 